services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:rw
      - app_vendor:/var/www/html/vendor
      - app_var:/var/www/html/var
      - composer_cache:/tmp/composer
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: change-me-in-env-local
      APP_CACHE_DIR: /tmp/symfony-cache
      APP_LOG_DIR: /tmp/symfony-log
      PHP_CLI_SERVER_WORKERS: 8
      DEFAULT_URI: http://localhost:8080
      DATABASE_URL: postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=1
      MAILER_DSN: smtp://mailpit:1025
      MAILER_FROM_EMAIL: ${MAILER_FROM_EMAIL:-no-reply@seo-geo-ai.local}
      MERCURE_URL: ${MERCURE_URL:-http://mercure/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-http://localhost:3000/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-SEO GEO AI}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-30}
      CRAWLER_MAX_DEPTH: ${CRAWLER_MAX_DEPTH:-2}
      CRAWLER_TIMEOUT_SECONDS: ${CRAWLER_TIMEOUT_SECONDS:-10}
      CRAWLER_DELAY_MS: ${CRAWLER_DELAY_MS:-250}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      CLAUDE_API_BASE_URL: ${CLAUDE_API_BASE_URL:-https://api.anthropic.com}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-32000}
      CLAUDE_TIMEOUT_SECONDS: ${CLAUDE_TIMEOUT_SECONDS:-300}
      CLAUDE_MAX_DURATION_SECONDS: ${CLAUDE_MAX_DURATION_SECONDS:-480}
      CMS_CREDENTIAL_ENCRYPTION_KEY: ${CMS_CREDENTIAL_ENCRYPTION_KEY:-}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2026-04}
      CMS_HTTP_TIMEOUT_SECONDS: ${CMS_HTTP_TIMEOUT_SECONDS:-30}
      CMS_MAX_IMAGE_BYTES: ${CMS_MAX_IMAGE_BYTES:-8388608}
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8080:8000"
    command: ["sh", "docker/entrypoint.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:rw
      - app_vendor:/var/www/html/vendor
      - app_var:/var/www/html/var
      - composer_cache:/tmp/composer
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: change-me-in-env-local
      APP_CACHE_DIR: /tmp/symfony-cache
      APP_LOG_DIR: /tmp/symfony-log
      DEFAULT_URI: http://localhost:8080
      DATABASE_URL: postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=1
      MAILER_DSN: smtp://mailpit:1025
      MAILER_FROM_EMAIL: ${MAILER_FROM_EMAIL:-no-reply@seo-geo-ai.local}
      MERCURE_URL: ${MERCURE_URL:-http://mercure/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-http://localhost:3000/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-SEO GEO AI}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-30}
      CRAWLER_MAX_DEPTH: ${CRAWLER_MAX_DEPTH:-2}
      CRAWLER_TIMEOUT_SECONDS: ${CRAWLER_TIMEOUT_SECONDS:-10}
      CRAWLER_DELAY_MS: ${CRAWLER_DELAY_MS:-250}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      CLAUDE_API_BASE_URL: ${CLAUDE_API_BASE_URL:-https://api.anthropic.com}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-32000}
      CLAUDE_TIMEOUT_SECONDS: ${CLAUDE_TIMEOUT_SECONDS:-300}
      CLAUDE_MAX_DURATION_SECONDS: ${CLAUDE_MAX_DURATION_SECONDS:-480}
      CMS_CREDENTIAL_ENCRYPTION_KEY: ${CMS_CREDENTIAL_ENCRYPTION_KEY:-}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2026-04}
      CMS_HTTP_TIMEOUT_SECONDS: ${CMS_HTTP_TIMEOUT_SECONDS:-30}
      CMS_MAX_IMAGE_BYTES: ${CMS_MAX_IMAGE_BYTES:-8388608}
    depends_on:
      database:
        condition: service_healthy
      php:
        condition: service_started
    command: ["sh", "docker/worker-entrypoint.sh"]

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: app
      POSTGRES_USER: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d app -U app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      # Modern Caddy-based Mercure Hub JWT configuration (v0.14+)
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
        publish_origins *
        anonymous
    ports:
      - "3000:80"

volumes:
  database_data:
  composer_cache:
  app_vendor:
  app_var:
