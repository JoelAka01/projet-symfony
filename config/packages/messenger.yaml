framework:
    messenger:
        failure_transport: failed

        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            failed: 'doctrine://default?queue_name=failed&auto_setup=1'

        routing:
            App\Message\RunClaudeAnalysisMessage: async
            App\Message\RunWebsiteAuditMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                failed: 'in-memory://'
