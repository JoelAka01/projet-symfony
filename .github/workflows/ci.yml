name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: PHPUnit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://app:app@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8
      APP_ENV: test
      APP_SECRET: ci-secret-replace-in-prod

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, intl, zip
          coverage: none

      - name: Create .env file
        run: cp .env.example .env

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked

      - name: Valider le fichier composer.json
        run: composer validate --strict

      - name: Linter les fichiers YAML
        run: php bin/console lint:yaml config --parse-tags

      - name: Linter les templates Twig
        run: php bin/console lint:twig templates

      - name: Linter le conteneur Symfony
        run: php bin/console lint:container

      - name: Lancer l'analyse PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Créer la base de données de test
        run: php bin/console doctrine:database:create --if-not-exists --no-interaction

      - name: Créer le schéma de base de données
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Charger les fixtures
        run: php bin/console doctrine:fixtures:load --no-interaction

      - name: Lancer les tests
        run: php bin/phpunit

